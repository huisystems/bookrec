name: Publish

on:
  # 手动触发：测试发布到 TestPyPI 或正式发布到 PyPI
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi
  # tag 推送时自动触发：v* 形式（如 v0.2.1）→ 自动推 TestPyPI 试发
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Run tests
        run: |
          pip install -e .
          pip install pytest python-dateutil
          pytest tests/ -v

      - name: Build distributions
        run: python -m build

      - name: Verify built artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to ${{ github.event.inputs.target || 'TestPyPI (from tag push)' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target == 'pypi' && 'pypi' || 'testpypi' }}
      url: ${{ github.event.inputs.target == 'pypi' && 'https://pypi.org/p/bookrec' || 'https://test.pypi.org/p/bookrec' }}
    permissions:
      # OIDC trusted publishing 必需
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
        path: dist/

      - name: Publish to PyPI
        if: github.event.inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI
        if: github.event.inputs.target != 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
